<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SWF to WebM Recorder</title>
<style>
  body {
    background: #111;
    color: white;
    font-family: sans-serif;
    text-align: center;
  }
  input, button {
    padding: 10px;
    margin: 5px;
    font-size: 16px;
  }
  #player {
    margin-top: 20px;
    width: 800px;
    height: 600px;
    margin-left: auto;
    margin-right: auto;
    background: black;
  }
  canvas {
    width: 100% !important;
    height: 100% !important;
  }
</style>
</head>
<body>

<h2>SWF → WebM Recorder (Ruffle)</h2>

<input id="swfUrl" placeholder="Enter SWF URL here" size="50">
<br>
<button onclick="loadSWF()">Load SWF</button>
<button onclick="startRecording()">Start Recording</button>
<button onclick="stopRecording()">Stop & Download</button>

<div id="player"></div>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
<script>
window.RufflePlayer = window.RufflePlayer || {};
window.RufflePlayer.config = {
    autoplay: "on",
    splashScreen: false,
    preferredRenderer: "canvas"
};

let ruffle;
let recorder;
let chunks = [];
let stream;

function loadSWF() {
    const url = document.getElementById("swfUrl").value;

    document.getElementById("player").innerHTML = "";

    const rufflePlayer = window.RufflePlayer.newest();
    const player = rufflePlayer.createPlayer();
    player.style.width = "100%";
    player.style.height = "100%";

    document.getElementById("player").appendChild(player);
    player.load(url);

    ruffle = player;
}

async function getCanvas() {
    return new Promise(resolve => {
        const check = setInterval(() => {
            const canvas = document.querySelector("#player canvas");
            if (canvas) {
                clearInterval(check);
                resolve(canvas);
            }
        }, 200);
    });
}

async function startRecording() {
    const canvas = await getCanvas();

    // Force user interaction (helps Chrome)
    canvas.focus();

    try {
        const stream = canvas.captureStream(30);

        recorder = new MediaRecorder(stream, {
            mimeType: "video/webm"
        });

        chunks = [];

        recorder.ondataavailable = e => {
            if (e.data.size > 0) chunks.push(e.data);
        };

        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: "video/webm" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "recording.webm";
            a.click();
        };

        recorder.start();
        console.log("Recording started");

    } catch (e) {
        alert("Recording failed: " + e.message);
        console.error(e);
    }
}

function stopRecording() {
    if (recorder) recorder.stop();
}
</script>

</body>
</html>
