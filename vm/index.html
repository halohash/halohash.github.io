
<!doctype html>
<title>HaloHash</title>

<style>
body {
    width: 100%;
    height: 100%;
    background-color: black;
    background-size: 100% 100%;
    padding: 0px;
    border: 0px;
    margin: -2px;
}

  #screen_container {
    background-color: black;
    width: 640px;
    height: 400px;
  }
  canvas {width: 100vw !important;height: 100vh !important;}
</style>

<script type="module"></script>
<script src="/lib/v86.js"></script>

<script>
function getVMImage() {
    const params = new URLSearchParams(location.search);
    const vm = params.get("vm");

    const vmMap = {
        "vm1": "https://file.garden/aUYIWVAKvQxCBY-_/vms/windows30-hda.img",
        "vm2": "https://file.garden/aUYIWVAKvQxCBY-_/vms/goatsexosfloppy.img"
    };

    return vmMap[vm] || vmMap["vm1"]; // default
}
function getFloppyImage() {
    const params = new URLSearchParams(location.search);
    const vm = params.get("vm");

    const vmMap = {
        "vm1": "https://file.garden/aUYIWVAKvQxCBY-_/vms/windows30-hda.img",
        "vm2": "https://file.garden/aUYIWVAKvQxCBY-_/vms/goatsexosfloppy.img"
    };

    return vmMap[vm] || vmMap["vm1"]; // default
}

window.onload = function () {
    const emulator = window.emulator = new V86({
        memory_size: 32 * 1024 * 1024,
        vga_memory_size: 2 * 1024 * 1024,
        screen_container: document.getElementById("screen_container"),
        bios: { url: "seabios.bin" },
        vga_bios: { url: "vgabios.bin" },
        hda: { url: getVMImage() + "?cb=" + Math.random() },
        autostart: true,
    });

    emulator.add_listener("vm-failure", function () {
        emulator.restart();
    });

    setTimeout(() => {
        const canvas = document.querySelector("#screen_container canvas");
        if (!canvas) return;

        canvas.style.display = "block";

        canvas.addEventListener("click", async () => {
            if (!document.pointerLockElement) {
                await canvas.requestPointerLock();
            }
        });

        canvas.tabIndex = 1;
        canvas.focus();
    }, 500);
};
</script>

<div id="screen_container">
    <div style="white-space: pre;font-family: Liberation Mono, DejaVu Sans Mono, Courier New, monospace;font-size: 14px;line-height: 17px;display: block;"></div>
    <canvas style="display:none"></canvas>
</div>
